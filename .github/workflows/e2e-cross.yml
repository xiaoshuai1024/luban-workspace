name: E2E Cross-project

# 跨项目流程性 E2E（发布闭环 / 线索闭环 / 双后端一致性）
# G4 门禁：PR 必过。失败阻断合入。
#
# 起齐 MySQL+Redis+双后端+bff+engine+website（docker-compose.e2e.yml），
# 预置 e2e 账号，跑 workspace 根 e2e/ 全流程。

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  cross-e2e:
    name: Cross-project E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Install e2e deps
        working-directory: e2e
        run: pnpm install

      - name: Install Playwright Chromium
        working-directory: e2e
        run: pnpm run install:e2e:ci

      - name: Start service stack
        run: make e2e-up

      - name: Seed e2e account
        env:
          JAVA_API: http://127.0.0.1:8080/backend
        # 预置专用 e2e 账号（通过 Java 后端接口或 SQL）
        # 若已有种子脚本则复用；否则此处 curl 创建
        run: |
          set -euo pipefail
          # TODO: 接入实际种子脚本（后端 /seed 或 SQL）
          # 临时：假定 compose 已含种子。e2e 账号经 secrets 注入。
          echo "e2e account seed — 接入后端种子脚本后替换"

      - name: Run cross-project E2E
        env:
          LUBAN_E2E_USE_PLAYWRIGHT_CHROMIUM: "1"
          LUBAN_E2E_ACCOUNT: ${{ secrets.LUBAN_E2E_ACCOUNT }}
          LUBAN_E2E_PASSWORD: ${{ secrets.LUBAN_E2E_PASSWORD }}
          LUBAN_E2E_ENGINE_URL: http://127.0.0.1:4200
          LUBAN_E2E_WEBSITE_URL: http://127.0.0.1:3000
          LUBAN_E2E_JAVA_API: http://127.0.0.1:8080
          LUBAN_E2E_GO_API: http://127.0.0.1:8081
          LUBAN_E2E_BFF_URL: http://127.0.0.1:3100
        working-directory: e2e
        run: pnpm test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Stop service stack
        if: always()
        run: make e2e-down
